name: Backup diario de base de datos

on:
  schedule:
    - cron: '0 7 * * *'   # 4:00 AM hora Uruguay (UTC-3) = 07:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGUSER: ${{ secrets.PGUSER }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      R2_BUCKET_NAME: udelarhits-backups

    steps:
      - name: Instalar postgresql-client 17
        run: |
          set -euo pipefail
          # El repo default de Ubuntu Noble solo trae postgresql-client 16, pero el
          # servidor (Supabase) corre PostgreSQL 17.x, y pg_dump aborta si su versión
          # es menor que la del servidor. Usamos el repo oficial PGDG para instalar el
          # cliente 17 y evitar el "server version mismatch".
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Generar dump comprimido
        run: |
          set -euo pipefail
          FILENAME="udelarhits_$(date +%Y-%m-%d).sql.gz"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          # pipefail hace que el pipeline falle si pg_dump falla,
          # en lugar de que gzip "tenga éxito" comprimiendo un stream vacío.
          pg_dump --no-owner --no-acl | gzip > "$FILENAME"

      - name: Verificar que el backup no esté vacío
        run: |
          set -euo pipefail
          SIZE=$(stat -c%s "$FILENAME")
          MIN_SIZE=10240  # 10KB: muy por debajo de un dump real, muy por encima de un gzip vacío (~20 bytes)
          if [ "$SIZE" -lt "$MIN_SIZE" ]; then
            echo "ERROR: el backup generado pesa solo $SIZE bytes (mínimo esperado: $MIN_SIZE)."
            echo "Probablemente pg_dump falló silenciosamente. Se aborta la subida a R2."
            exit 1
          fi
          echo "Backup OK: $SIZE bytes"

      - name: Configurar AWS CLI para R2
        run: |
          aws configure set aws_access_key_id "${{ secrets.R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          aws configure set region auto

      - name: Subir backup a R2
        run: |
          aws s3 cp "$FILENAME" "s3://$R2_BUCKET_NAME/$FILENAME" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      - name: Borrar backups con más de 30 días
        run: |
          CUTOFF=$(date -d "30 days ago" +%Y-%m-%d)
          aws s3 ls "s3://$R2_BUCKET_NAME/" --endpoint-url "${{ secrets.R2_ENDPOINT }}" | \
          while read -r line; do
            FILE=$(echo "$line" | awk '{print $4}')
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{4}-\d{2}-\d{2}')
            if [[ -n "$FILE_DATE" && "$FILE_DATE" < "$CUTOFF" ]]; then
              echo "Borrando backup viejo: $FILE"
              aws s3 rm "s3://$R2_BUCKET_NAME/$FILE" --endpoint-url "${{ secrets.R2_ENDPOINT }}"
            fi
          done
