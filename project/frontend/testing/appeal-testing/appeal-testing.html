<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apelaciones — Panel Admin</title>
  <style> html { visibility: hidden; } </style>
  <script src="/shared/guard/admin-guard.js"></script>
  <script src="/shared/anti-flash.js"></script>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="appeal.css" />
</head>
<body>
  <main>
    <div class="appeal-admin">

      <div class="appeal-admin-header">
        <a class="btn btn-volver" href="/testing.html">← Volver</a>
        <h1>Apelaciones pendientes</h1>
        <p class="appeal-admin-desc">Revisá las apelaciones de contenido moderado. Aceptar restaura el contenido; rechazar lo elimina definitivamente.</p>
      </div>

      <!-- Apelaciones de categorías -->
      <section class="appeal-section">
        <h2>Categorías</h2>
        <div id="appealsCategoria" class="appeal-list">
          <div class="appeal-loading">Cargando...</div>
        </div>
      </section>

      <!-- Apelaciones de temas -->
      <section class="appeal-section">
        <h2>Temas</h2>
        <div id="appealsTema" class="appeal-list">
          <div class="appeal-loading">Cargando...</div>
        </div>
      </section>

      <!-- Apelaciones de comentarios -->
      <section class="appeal-section">
        <h2>Comentarios</h2>
        <div id="appealsComentario" class="appeal-list">
          <div class="appeal-loading">Cargando...</div>
        </div>
      </section>

    </div>
  </main>

  <script src="/shared/escape.js"></script>
  <script src="/shared/api.js"></script>
  <script src="/shared/theme.js"></script>
  <script src="/shared/header-testing.js"></script>
  <script src="appeal.js"></script>
</body>
</html>
