<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modificar categoría</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/user/profile.css" />
</head>
<body>
  <main>
    <div class="profile-card">
  
      <div class="card">
        <div class="card-info">
          <h2>Título</h2>
          <p id="categoryTitulo"></p>
        </div>
      </div>
  
      <div class="card">
        <div class="card-info">
          <h2>Descripción</h2>
          <div class="edit-row">
            <p id="categoryDescripcion"></p>
            <button class="edit-btn" data-field="descripcion" title="Editar descripción">✏️</button>
          </div>
          <textarea id="inputDescripcion" class="edit-input" style="display:none;"></textarea>
        </div>
      </div>
  
      <div class="card">
        <div class="card-info">
          <h2>Etiquetas</h2>
          <div id="etiquetasContainer" style="max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 8px; border-radius: 6px; margin-top: 8px;">
            <!-- Vida universitaria -->
            <label><input type="checkbox" value="Facultades"> Facultades</label>
            <label><input type="checkbox" value="Parciales y exámenes"> Parciales y exámenes</label>
            <label><input type="checkbox" value="Becas y trámites"> Becas y trámites</label>
            <label><input type="checkbox" value="Residencias"> Residencias</label>
            <label><input type="checkbox" value="Pasantías"> Pasantías</label>

            <!-- Académico -->
            <label><input type="checkbox" value="Educación"> Educación</label>
            <label><input type="checkbox" value="Ciencia"> Ciencia</label>
            <label><input type="checkbox" value="Matemática"> Matemática</label>
            <label><input type="checkbox" value="Ingeniería"> Ingeniería</label>
            <label><input type="checkbox" value="Filosofía"> Filosofía</label>
            <label><input type="checkbox" value="Historia"> Historia</label>
            <label><input type="checkbox" value="Psicología"> Psicología</label>
            <label><input type="checkbox" value="Economía"> Economía</label>
            <label><input type="checkbox" value="Política"> Política</label>
            <label><input type="checkbox" value="Derecho"> Derecho</label>
            <label><input type="checkbox" value="Medicina"> Medicina</label>

            <!-- Tecnología -->
            <label><input type="checkbox" value="Programación"> Programación</label>
            <label><input type="checkbox" value="Desarrollo web"> Desarrollo web</label>
            <label><input type="checkbox" value="Software"> Software</label>
            <label><input type="checkbox" value="Ciberseguridad"> Ciberseguridad</label>
            <label><input type="checkbox" value="Inteligencia artificial"> Inteligencia artificial</label>
            <label><input type="checkbox" value="Gadgets"> Gadgets</label>
            <label><input type="checkbox" value="Gaming"> Gaming</label>

            <!-- Creatividad -->
            <label><input type="checkbox" value="Arte"> Arte</label>
            <label><input type="checkbox" value="Diseño"> Diseño</label>
            <label><input type="checkbox" value="Fotografía"> Fotografía</label>
            <label><input type="checkbox" value="Cine y TV"> Cine y TV</label>
            <label><input type="checkbox" value="Música"> Música</label>
            <label><input type="checkbox" value="Escritura"> Escritura</label>
            <label><input type="checkbox" value="Animación"> Animación</label>
            <label><input type="checkbox" value="Manualidades"> Manualidades</label>
            <label><input type="checkbox" value="Moda"> Moda</label>

            <!-- Vida cotidiana -->
            <label><input type="checkbox" value="Vida diaria"> Vida diaria</label>
            <label><input type="checkbox" value="Relaciones"> Relaciones</label>
            <label><input type="checkbox" value="Cocina"> Cocina</label>
            <label><input type="checkbox" value="Salud y fitness"> Salud y fitness</label>
            <label><input type="checkbox" value="Trabajo y carrera"> Trabajo y carrera</label>
            <label><input type="checkbox" value="Hogar"> Hogar</label>
            <label><input type="checkbox" value="Mascotas"> Mascotas</label>
            <label><input type="checkbox" value="Hobbies"> Hobbies</label>

            <!-- Sociedad -->
            <label><input type="checkbox" value="Cultura"> Cultura</label>
            <label><input type="checkbox" value="Viajes"> Viajes</label>
            <label><input type="checkbox" value="Deportes"> Deportes</label>
            <label><input type="checkbox" value="Naturaleza"> Naturaleza</label>
            <label><input type="checkbox" value="Medio ambiente"> Medio ambiente</label>
            <label><input type="checkbox" value="Noticias"> Noticias</label>
            <label><input type="checkbox" value="Eventos"> Eventos</label>

            <!-- Comunidad -->
            <label><input type="checkbox" value="Memes"> Memes</label>
            <label><input type="checkbox" value="Tutoriales"> Tutoriales</label>
            <label><input type="checkbox" value="Preguntas"> Preguntas</label>
            <label><input type="checkbox" value="Historias"> Historias</label>
            <label><input type="checkbox" value="Reseñas"> Reseñas</label>
            <label><input type="checkbox" value="Feedback"> Feedback</label>
            <label><input type="checkbox" value="Autos y motos"> Autos y motos</label>
            <label><input type="checkbox" value="Jardinería"> Jardinería</label>
            <label><input type="checkbox" value="Otro"> Otro</label>
          </div>
        </div>
      </div>
  
      <div class="card">
        <div class="card-info">
          <h2>Eliminar categoría</h2>
          <button class="btn btn-delete confirm" id="eliminarBtn">eliminar</button>
          <textarea id="inputDescripcion" class="edit-input" style="display:none;"></textarea>
        </div>
      </div>
  
      <div class="button-container">
        <a class="btn btn-register cancel" href="myCategories.html">Cancelar</a>
        <button class="btn btn-register confirm" id="confirmBtn">Confirmar</button>
      </div>
    </div>
  </main>

  <script src="../../shared/transitions.js"></script>
  <script src="../../shared/header-testing.js"></script>
  <script src="../../shared/escape.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="updateCategory.js"></script>
</body>
</html>
