<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil de usuario</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/profile.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="profile-card">

    <div class="avatar">
      <img id="profileAvatar" src="" alt="Avatar" title="foto de perfil">
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Nickname</h2>
        <p id="profileNickname"></p>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Nombre</h2>
        <p id="profileNombre"></p>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Email</h2>
        <p id="profileEmail"></p>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Biografía</h2>
        <p id="profileBio"></p>
      </div>
    </div>

    
    <div class="button-container">
      <a class="btn btn-register cancel" href="profile.html">Cancelar</a>
      <a class="btn btn-register confirm" href="profile.html">Confirmar</a>
    </div>
    

  </div>
  <script src="../js/header.js"></script>
  <script src="/js/api.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
