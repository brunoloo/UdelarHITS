<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — UdelarHITS</title>
  <link rel="icon" href="../../favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/user/auth.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" class="auth-brand">Udelar<span>HITS</span></a>
      <h1 class="auth-title">Crear cuenta</h1>
      <p class="auth-subtitle">Únete a la comunidad de Udelar</p>
      <form class="auth-form" id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="nombre">Nombre completo</label>
          <input
            class="form-input"
            id="nombre"
            name="nombre"
            type="text"
            placeholder="Tu nombre completo"
            autocomplete="name"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="nickname">Nickname</label>
          <input
            class="form-input"
            id="nickname"
            name="nickname"
            type="text"
            placeholder="Tu nickname"
            autocomplete="username"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-input"
            id="email"
            name="email"
            type="email"
            placeholder="Tu email"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              id="password"
              name="password"
              type="password"
              placeholder="Mínimo 8 caracteres"
              autocomplete="new-password"
              required
            />
            <button type="button" class="input-toggle" aria-label="Mostrar contraseña">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="auth-message" id="authMessage"></div>
        <button type="submit" class="auth-btn">Crear cuenta</button>
      </form>
      <hr class="auth-divider" />
      <p class="auth-footer">
        ¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a>
      </p>
    </div>
  </div>
  <script src="../../shared/escape.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="auth.js"></script>
</body>
</html>
