<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modificar categoría</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/profile.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="profile-card">

    <div class="card">
      <div class="card-info">
        <h2>Título</h2>
        <p id="categoryTitulo"></p>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Descripción</h2>
        <div class="edit-row">
          <p id="categoryDescripcion"></p>
          <button class="edit-btn" data-field="descripcion" title="Editar descripción">✏️</button>
        </div>
        <textarea id="inputDescripcion" class="edit-input" style="display:none;"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Etiquetas</h2>
        <div id="etiquetasContainer" style="max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 8px; border-radius: 6px; margin-top: 8px;">
          <label><input type="checkbox" value="Lifestyle"> Lifestyle</label>
          <label><input type="checkbox" value="Daily life"> Daily life</label>
          <label><input type="checkbox" value="Relationships"> Relationships</label>
          <label><input type="checkbox" value="Education"> Education</label>
          <label><input type="checkbox" value="Work & career"> Work & career</label>
          <label><input type="checkbox" value="Travel"> Travel</label>
          <label><input type="checkbox" value="Culture"> Culture</label>
          <label><input type="checkbox" value="Food & cooking"> Food & cooking</label>
          <label><input type="checkbox" value="Health & fitness"> Health & fitness</label>
          <label><input type="checkbox" value="Art"> Art</label>
          <label><input type="checkbox" value="Design"> Design</label>
          <label><input type="checkbox" value="Photography"> Photography</label>
          <label><input type="checkbox" value="Film & TV"> Film & TV</label>
          <label><input type="checkbox" value="Writing"> Writing</label>
          <label><input type="checkbox" value="Music"> Music</label>
          <label><input type="checkbox" value="Crafts"> Crafts</label>
          <label><input type="checkbox" value="Animation"> Animation</label>
          <label><input type="checkbox" value="Fashion"> Fashion</label>
          <label><input type="checkbox" value="Tech"> Tech</label>
          <label><input type="checkbox" value="Programming"> Programming</label>
          <label><input type="checkbox" value="Gadgets"> Gadgets</label>
          <label><input type="checkbox" value="Machine Learning"> Machine Learning</label>
          <label><input type="checkbox" value="Cybersecurity"> Cybersecurity</label>
          <label><input type="checkbox" value="Software"> Software</label>
          <label><input type="checkbox" value="Gaming"> Gaming</label>
          <label><input type="checkbox" value="Web development"> Web development</label>
          <label><input type="checkbox" value="Science"> Science</label>
          <label><input type="checkbox" value="Philosophy"> Philosophy</label>
          <label><input type="checkbox" value="History"> History</label>
          <label><input type="checkbox" value="Psychology"> Psychology</label>
          <label><input type="checkbox" value="Politics"> Politics</label>
          <label><input type="checkbox" value="Economics"> Economics</label>
          <label><input type="checkbox" value="Math"> Math</label>
          <label><input type="checkbox" value="Engineering"> Engineering</label>
          <label><input type="checkbox" value="Pets"> Pets</label>
          <label><input type="checkbox" value="Hobbies"> Hobbies</label>
          <label><input type="checkbox" value="Home & DIY"> Home & DIY</label>
          <label><input type="checkbox" value="Cars & motors"> Cars & motors</label>
          <label><input type="checkbox" value="Sports"> Sports</label>
          <label><input type="checkbox" value="Nature"> Nature</label>
          <label><input type="checkbox" value="Environment"> Environment</label>
          <label><input type="checkbox" value="Gardening"> Gardening</label>
          <label><input type="checkbox" value="Memes"> Memes</label>
          <label><input type="checkbox" value="News"> News</label>
          <label><input type="checkbox" value="Reviews"> Reviews</label>
          <label><input type="checkbox" value="Tutorials"> Tutorials</label>
          <label><input type="checkbox" value="Q&A"> Q&A</label>
          <label><input type="checkbox" value="Stories"> Stories</label>
          <label><input type="checkbox" value="Events"> Events</label>
          <label><input type="checkbox" value="Feedback"> Feedback</label>
          <label><input type="checkbox" value="Other"> Other</label>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Eliminar categoría</h2>
        <button class="btn btn-delete confirm" id="eliminarBtn">eliminar</button>
        <textarea id="inputDescripcion" class="edit-input" style="display:none;"></textarea>
      </div>
    </div>

    <div class="button-container">
      <a class="btn btn-register cancel" href="myCategories.html">Cancelar</a>
      <button class="btn btn-register confirm" id="confirmBtn">Confirmar</button>
    </div>

    

  </div>

  <script src="../../shared/transitions.js"></script>
  <script src="../../shared/header.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="updateCategory.js"></script>
</body>
</html>
