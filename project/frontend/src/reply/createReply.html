<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear comentario</title>
  <link rel="stylesheet" href="../../css/main.css" />
</head>
<body>
  <main>
    <h1>Crear comentario</h1>
  
    <form id="createReplyForm">
      <select name="categoria_id" required>
        <option value="" disabled selected>Seleccioná una categoría</option>
      </select>
  
      <select name="tema_id" disabled>
        <option value="">Comentar directo en la categoría</option>
      </select>
  
      <textarea name="cuerpo" placeholder="Escribí tu comentario..." required></textarea>
  
      <button>Publicar comentario</button>
    </form>
  </main>

  <script src="../../shared/transitions.js"></script>
  <script src="../../shared/header.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="createReply.js"></script>
</body>
</html>
