<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modificar perfil</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/profile.css" />
</head>
<body>
  <div class="profile-card">

    <div class="avatar">
      <div class="avatar-wrapper">
        <img id="profileAvatar" src="" alt="Avatar" title="foto de perfil">
        <button class="avatar-edit-btn" id="avatarEditBtn" title="Cambiar foto">✏️</button>
      </div>
      <input type="text" id="avatarInput" placeholder="URL de imagen" class="edit-input" style="display:none; margin-top: 8px;" />
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Nickname</h2>
        <p id="profileNickname"></p>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Nombre</h2>
        <div class="edit-row">
          <p id="profileNombre"></p>
          <button class="edit-btn" data-field="nombre" title="Editar nombre">✏️</button>
        </div>
        <input type="text" id="inputNombre" class="edit-input" style="display:none;" />
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Email</h2>
        <p id="profileEmail"></p>
      </div>
    </div>

    <div class="card">
      <div class="card-info">
        <h2>Biografía</h2>
        <div class="edit-row">
          <p id="profileBio"></p>
          <button class="edit-btn" data-field="biografia" title="Editar biografía">✏️</button>
        </div>
        <textarea id="inputBiografia" class="edit-input" style="display:none;"></textarea>
      </div>
    </div>

    <div class="button-container">
      <a class="btn btn-register cancel" href="profile.html">Cancelar</a>
      <button class="btn btn-register confirm" id="confirmBtn">Confirmar</button>
    </div>

  </div>

  <script src="../../shared/transitions.js"></script>
  <script src="../../shared/header.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="updateProfile.js"></script>
</body>
</html>
