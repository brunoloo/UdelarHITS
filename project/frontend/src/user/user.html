<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Perfil Usuario</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <h1>Perfil de usuario</h1>
  
    <h2>Datos</h2>
    <table id="userTable" border="1" cellpadding="8" cellspacing="0">
      <tbody></tbody>
    </table>
  
    <h2>Categorías</h2>
    <table id="categoriesTable" border="1" cellpadding="8" cellspacing="0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Título</th>
          <th>Etiqueta</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  
    <h2>Seguidores</h2>
    <table id="followersTable" border="1" cellpadding="8" cellspacing="0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nickname</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  
    <h2>Seguidos</h2>
    <table id="followingTable" border="1" cellpadding="8" cellspacing="0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nickname</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="../../shared/transitions.js"></script>
  <script src="../../shared/header.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="user.js"></script>
</body>
</html>
