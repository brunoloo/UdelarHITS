<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — UdelarHITS</title>
  <link rel="icon" href="../../favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/user/profile.css" />
</head>
<body>

  <div class="profile-page">
    <div class="profile-card" id="profileCard">
      <!-- Banner y avatar -->
      <div class="profile-banner-wrap">
        <div class="profile-banner">
          <span class="banner-placeholder">Acá iría el banner</span>
        </div>
        <div class="profile-avatar-wrap">
          <img id="profileAvatar" class="profile-avatar" src="" alt="Avatar" />
          <div class="profile-avatar-fallback" id="profileAvatarFallback" style="display:none"></div>
        </div>

      </div>

      <!-- Botón editar (derecha, mismo nivel visual que el avatar) -->
      <div class="profile-actions">
        <a class="btn-ghost profile-edit-btn">Editar perfil</a>
      </div>

      <!-- Info del usuario -->
      <div class="profile-info">
        <p class="profile-name"  id="profileNombre"></p>
        <div class="profile-handle-row">
          <p class="profile-handle" id="profileNickname"></p>
        </div>
        <p class="profile-bio"   id="profileBio"></p>
        <p class="profile-fecha" id="profileFecha"></p>
        <div class="profile-social-row">
          <button class="profile-social-btn" id="btnSeguidores">
            <strong id="profileSeguidores">0</strong> <span id="labelSeguidores">Seguidores</span>
          </button>
          <button class="profile-social-btn" id="btnSeguidos">
            <strong id="profileSeguidos">0</strong> <span id="labelSeguidos">Seguidos</span>
          </button>
        </div>
      </div>

      <!-- Modal avatar -->
      <div class="avatar-modal" id="avatarModal">
        <button class="avatar-modal-close" id="avatarModalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <img class="avatar-modal-img" id="avatarModalImg" src="" alt="Avatar" />
      </div>
    </div>

    <!-- Tabs de actividad -->
    <nav class="section-tabs" role="tablist">
      <button class="tab active" role="tab" data-tab="categorias">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        Categorías <span class="count" id="countCategorias">0</span>
      </button>
      <button class="tab" role="tab" data-tab="temas">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        Temas <span class="count" id="countTemas">0</span>
      </button>
      <button class="tab" role="tab" data-tab="comentarios">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Comentarios <span class="count" id="countComentarios">0</span>
      </button>
    </nav>

    <section class="section-panel active" data-panel="categorias">
      <div class="cat-grid" id="panelCategorias"></div>
    </section>

    <section class="section-panel" data-panel="temas">
      <div class="list" id="panelTemas"></div>
    </section>

    <section class="section-panel" data-panel="comentarios">
      <div class="list" id="panelComentarios"></div>
    </section>

    <!-- Modal editar perfil -->
    <div class="modal-backdrop" id="editModal">
      <div class="modal">
        <div class="modal-head">
          <button class="modal-close" id="closeModal">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
          <h3>Editar perfil</h3>
          <button class="save-btn" id="saveBtn">Guardar</button>
        </div>

        <div class="edit-banner" id="editBanner">
          <div class="edit-banner-overlay">
            <button class="icon-circle" id="changeBannerBtn" type="button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
            <button class="icon-circle" id="removeBannerBtn" type="button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <input type="file" id="bannerFileInput" accept="image/*" hidden />
        </div>

        <div class="edit-avatar-row">
          <div class="edit-avatar-wrap">
            <img id="editAvatarPreview" class="edit-avatar-img" src="" alt="Avatar" />
            <button class="edit-avatar-overlay" id="changeAvatarBtn" type="button">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
            <input type="file" id="avatarFileInput" accept="image/*" hidden />
          </div>
        </div>

        <div class="edit-body">
          <div class="edit-field">
            <div class="edit-field-label">
              <span>Nombre</span>
              <span class="edit-field-counter" id="nameCounter">0 / 50</span>
            </div>
            <input id="fName" type="text" maxlength="50" />
          </div>

          <div class="edit-field">
            <div class="edit-field-label">
              <span>Biografía</span>
              <span class="edit-field-counter" id="bioCounter">0 / 160</span>
            </div>
            <textarea id="fBio" maxlength="160" rows="3"></textarea>
          </div>
        </div>
      </div>
    </div>
  </div>



  <script src="../../shared/escape.js"></script>
  <script src="../../shared/api.js"></script>
  <script src="../../shared/header.js"></script>
  <script src="../../shared/leftnav.js"></script>
  <script src="profile.js"></script>
</body>
</html>
